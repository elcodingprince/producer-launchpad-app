app = "producer-launchpad-app"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[env]
  CHROME_PATH = "/usr/bin/chromium"
  DATABASE_URL = "file:/data/producer-launchpad.sqlite"
  NODE_ENV = "production"
  PORT = "8080"

[[mounts]]
  source = "producer_launchpad_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_start_machines = true
  auto_stop_machines = "off"
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
